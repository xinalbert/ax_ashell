<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="1024" height="1024" viewBox="0 0 1024 1024">
  <title>Full Bleed Modern Terminal Icon</title>
  <desc>Pure vector terminal icon with transparent background, modern full-bleed proportions.</desc>

  <defs>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#143866"/>
      <stop offset="55%" stop-color="#0b2a56"/>
      <stop offset="100%" stop-color="#071a39"/>
    </linearGradient>

    <linearGradient id="rimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6aa3ff"/>
      <stop offset="100%" stop-color="#2f6fd9"/>
    </linearGradient>

    <linearGradient id="innerRimGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#204c92"/>
      <stop offset="100%" stop-color="#15396d"/>
    </linearGradient>
  </defs>

  <!-- 主体：尽量铺满画布 -->
  <rect x="18" y="18" width="988" height="988" rx="146"
        fill="url(#panelGrad)"/>

  <!-- 外边缘高亮轮廓 -->
  <rect x="18" y="18" width="988" height="988" rx="146"
        fill="none" stroke="url(#rimGrad)" stroke-width="14"/>

  <!-- 内轮廓 -->
  <rect x="36" y="36" width="952" height="952" rx="132"
        fill="none" stroke="url(#innerRimGrad)" stroke-width="6" opacity="0.95"/>

  <!-- 命令提示符 -->
  <path d="M248 284 L496 532 L248 780"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="64"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 下划线 -->
  <path d="M566 754 H760"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="54"
        stroke-linecap="round"/>
</svg>
