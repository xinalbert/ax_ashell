name: Release

# Build native binaries for Windows / Linux / macOS.
#  - Push a tag like `v2026.7.6` or `v2026.7.6-1`
#    -> builds all platforms and attaches the archives to a GitHub Release.
#  - Run manually (workflow_dispatch) -> builds all platforms and uploads them as
#    downloadable workflow artifacts (no release created).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create / update the GitHub Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: ax_shell.exe
          - os: ubuntu-22.04 # build on the oldest supported runner for broader glibc compatibility
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            bin: ax_shell
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
            name: macos-aarch64
            bin: ax_shell
          - os: macos-14 # Intel (cross-compiled from Apple Silicon to avoid queue delays)
            target: x86_64-apple-darwin
            name: macos-x86_64
            bin: ax_shell

    steps:
      - uses: actions/checkout@v5

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            "$PYTHON_BIN" scripts/release_version.py env --tag "$GITHUB_REF_NAME" >> "$GITHUB_ENV"
            "$PYTHON_BIN" scripts/release_version.py sync-manifest --tag "$GITHUB_REF_NAME"
          else
            "$PYTHON_BIN" scripts/release_version.py env --cargo-version-file Cargo.toml >> "$GITHUB_ENV"
          fi

      # GPUI needs these system libs on Linux to compile.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libfontconfig1-dev libfreetype6-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgtk-3-dev \
            libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -eu
          VERSION_LABEL="${GITHUB_REF_NAME:-dev}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            VERSION_LABEL="${RELEASE_TAG}"
          fi
          STAGE="ax_shell-${VERSION_LABEL}-${{ matrix.name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # ── Build a proper .app bundle ────────────────────────────────────
            # Note: We build the bundle manually here rather than running
            # scripts/package-macos-app.sh, because that script runs `cargo build`
            # without respecting the `--target` flag from the matrix.

            APP="AxShell.app"
            CONTENTS="$APP/Contents"
            mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$CONTENTS/MacOS/"
            cp "assets/icons/terminal_icon_all_formats/terminal_icon.icns" "$CONTENTS/Resources/ax_shell.icns"

            cat > "$CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>ax_shell</string>
            <key>CFBundleDisplayName</key>
            <string>AxShell</string>
            <key>CFBundleIconFile</key>
            <string>ax_shell.icns</string>
            <key>CFBundleIdentifier</key>
            <string>dev.ax_shell.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>AxShell</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${RELEASE_BUNDLE_SHORT_VERSION}</string>
            <key>CFBundleVersion</key>
            <string>${RELEASE_BUNDLE_VERSION}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

            printf 'APPL????' > "$CONTENTS/PkgInfo"

            # Ad-hoc code-sign the assembled bundle.
            codesign --force --deep --sign - "$APP"
            codesign --verify --verbose "$APP"

            # Package with ditto (Apple's tool) to preserve signature/metadata
            ditto -c -k --keepParent "$APP" "${STAGE}.zip"
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          elif [ "${{ runner.os }}" = "Windows" ]; then
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          else
            # Linux
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          PYTHON_BIN=python3
          if ! command -v "$PYTHON_BIN" >/dev/null 2>&1; then
            PYTHON_BIN=python
          fi
          "$PYTHON_BIN" scripts/release_version.py env --tag "$GITHUB_REF_NAME" >> "$GITHUB_ENV"

      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release highlights
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          current_commit="$(git rev-list -n 1 "$current_tag")"
          previous_tag="$(git describe --tags --abbrev=0 "${current_commit}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            range="${previous_tag}..${current_tag}"
            comparison_label="${previous_tag}...${current_tag}"
          else
            range="$current_tag"
            comparison_label="$current_tag"
          fi

          mkdir -p release
          body="release/body.md"
          commits="release/commits.tsv"
          seen_commits="release/seen-commits.txt"

          git log --format='%h%x09%s' "$range" > "$commits"
          : > "$seen_commits"

          cat > "$body" <<EOF
          ## Highlights

          _Automatically selected from commits in \`${comparison_label}\`._

          EOF

          add_section() {
            local title="$1"
            local pattern="$2"
            local limit="${3:-8}"
            local tmp="release/${title// /_}.md"

            awk -F '\t' -v pattern="$pattern" -v limit="$limit" -v seen_file="$seen_commits" '
              BEGIN {
                count = 0
                while ((getline seen_commit < seen_file) > 0) {
                  seen[seen_commit] = 1
                }
                close(seen_file)
              }
              tolower($2) ~ /implementation tracking|tracking records|project[- ]implementation|env audit/ {
                next
              }
              !($1 in seen) && tolower($2) ~ pattern {
                print "- `" $1 "` " $2
                print $1 >> seen_file
                seen[$1] = 1
                count++
                if (count >= limit) {
                  exit
                }
              }
            ' "$commits" > "$tmp"

            if [ -s "$tmp" ]; then
              printf '### %s\n\n' "$title" >> "$body"
              cat "$tmp" >> "$body"
              printf '\n\n' >> "$body"
            fi
          }

          add_section "Settings and themes" 'settings|custom|theme|brightness|foreground|font'
          add_section "App UI and assets" 'monitoring|titlebar|window|input|focus|icon|asset'
          add_section "Terminal rendering" 'terminal url|url highlighting|ansi|truecolor|scrollback|split-screen'
          add_section "SSH and compatibility" 'ssh|sftp|russh|legacy|fallback|algorithm|x11|xquartz'
          add_section "Development workflow" 'dev-reload|reload|logging|rebuild|format|startup'
          add_section "Release and packaging" 'release|workflow|artifact|publish|package|packaging|cask|version'
          add_section "Dependency updates" 'upgrade|dependency|dependencies|crate|russh|alacritty|official'

          if ! grep -q '^- `' "$body"; then
            cat >> "$body" <<EOF
          No high-signal commit keywords were detected. See the generated release notes below for the full changelog.

          EOF
          fi

          cat >> "$body" <<EOF
          ## Keyword Rules

          - Settings and themes: \`settings\`, \`custom\`, \`theme\`, \`brightness\`, \`foreground\`, \`font\`
          - App UI and assets: \`monitoring\`, \`titlebar\`, \`window\`, \`input\`, \`focus\`, \`icon\`, \`asset\`
          - Terminal rendering: \`terminal url\`, \`url highlighting\`, \`ansi\`, \`truecolor\`, \`scrollback\`, \`split-screen\`
          - SSH and compatibility: \`ssh\`, \`sftp\`, \`russh\`, \`legacy\`, \`fallback\`, \`algorithm\`, \`x11\`, \`xquartz\`
          - Development workflow: \`dev-reload\`, \`reload\`, \`logging\`, \`rebuild\`, \`format\`, \`startup\`
          - Release and packaging: \`release\`, \`workflow\`, \`artifact\`, \`publish\`, \`package\`, \`packaging\`, \`cask\`, \`version\`
          - Dependencies: \`upgrade\`, \`dependency\`, \`dependencies\`, \`crate\`, \`russh\`, \`alacritty\`, \`official\`

          EOF

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: AxShell ${{ env.RELEASE_PUBLIC_VERSION }}
          files: dist/**/*
          body_path: release/body.md
          generate_release_notes: true
          fail_on_unmatched_files: true

