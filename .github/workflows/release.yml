name: Release

# Build native binaries for Windows / Linux / macOS.
#  - Push a tag like `v2026.07.06` or `v2026.07.06.1`
#    -> builds all platforms and attaches the archives to a GitHub Release.
#  - Run manually (workflow_dispatch) -> builds all platforms and uploads them as
#    downloadable workflow artifacts (no release created).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create / update the GitHub Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: ax_ashell.exe
          - os: ubuntu-22.04 # build on the oldest supported runner for broader glibc compatibility
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            bin: ax_ashell
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
            name: macos-aarch64
            bin: ax_ashell
          - os: macos-14 # Intel (cross-compiled from Apple Silicon to avoid queue delays)
            target: x86_64-apple-darwin
            name: macos-x86_64
            bin: ax_ashell

    steps:
      - uses: actions/checkout@v5

      # GPUI needs these system libs on Linux to compile.
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config cmake \
            libfontconfig1-dev libfreetype6-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgtk-3-dev \
            libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME:-dev}"
          STAGE="ax_ashell-${VERSION}-${{ matrix.name }}"

          if [ "${{ runner.os }}" = "macOS" ]; then
            # ── Build a proper .app bundle ────────────────────────────────────
            # Note: We build the bundle manually here rather than running
            # scripts/package-macos-app.sh, because that script runs `cargo build`
            # without respecting the `--target` flag from the matrix.

            APP="ax_ashell.app"
            CONTENTS="$APP/Contents"
            mkdir -p "$CONTENTS/MacOS" "$CONTENTS/Resources"

            cp "target/${{ matrix.target }}/release/ax_ashell" "$CONTENTS/MacOS/"
            cp "assets/icons/terminal_icon_all_formats/terminal_icon.icns" "$CONTENTS/Resources/ax_ashell.icns"

            VERSION_NUM="${VERSION#v}"
            cat > "$CONTENTS/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>ax_ashell</string>
            <key>CFBundleIconFile</key>
            <string>ax_ashell.icns</string>
            <key>CFBundleIdentifier</key>
            <string>dev.ax_ashell.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>ax_ashell</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION_NUM}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

            printf 'APPL????' > "$CONTENTS/PkgInfo"

            # Ad-hoc code-sign the assembled bundle.
            codesign --force --deep --sign - "$APP"
            codesign --verify --verbose "$APP"

            # Package with ditto (Apple's tool) to preserve signature/metadata
            ditto -c -k --keepParent "$APP" "${STAGE}.zip"
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          elif [ "${{ runner.os }}" = "Windows" ]; then
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
            echo "ASSET=${STAGE}.zip" >> "$GITHUB_ENV"

          else
            # Linux
            mkdir "$STAGE"
            cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$STAGE/"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "ASSET=${STAGE}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true

